- name: Create local temp dashboard directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/.tmp/grafana-dashboards"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true
  become: false

- name: Render dashboard templates locally
  ansible.builtin.template:
    src: "{{ role_path }}/templates/dashboards/{{ item }}"
    dest: "{{ playbook_dir }}/.tmp/grafana-dashboards/{{ item | regex_replace('\\.j2$', '') }}"
    mode: "0644"
  loop:
    - nginx-ha-dashboard-v1.json.j2
    - nginx-ha-dashboard-v2.json.j2
  delegate_to: localhost
  run_once: true
  become: false

- name: Setup Grafana
  ansible.builtin.import_role:
    name: grafana.grafana.grafana
  vars:
    grafana_ini:
      security:
        admin_password: "{{ grafana_admin_password }}"
    grafana_datasources:
      - name: Prometheus
        type: prometheus
        url: http://localhost:9090
        access: proxy
        is_default: true
    grafana_dashboards_dir: "{{ playbook_dir }}/.tmp/grafana-dashboards"
