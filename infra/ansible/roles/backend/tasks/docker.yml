---
- name: Install required system packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3-setuptools
    state: present
    update_cache: true

- name: Add Docker GPG apt Key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  ansible.builtin.apt_repository:
    repo: deb https://download.docker.com/linux/ubuntu {{ backend_ubuntu_version }} stable
    state: present

- name: Update apt and install docker-ce and docker-compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-compose
      - python3-docker
    state: present
    update_cache: true
