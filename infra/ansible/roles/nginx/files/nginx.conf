http {
    # Create rate limiters (in memory)
    # TODO: Migrate to Redis later for HA
    limit_req_zone $binary_remote_addr zone=main:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Connection retry config
    proxy_next_upstream error timeout http_500 http_502 http_503;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 5s;

    # Caching config
    proxy_cache_path /var/cache/nginx/products levels=1:2 keys_zone=products:10m;

    # Logging
    log_format detailed '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent $upstream_cache_status '
                         '"$http_referer" "$http_user_agent" '
                         '$request_time $upstream_response_time $pipe';

    access_log /var/log/nginx/detailed-access.log detailed;

    include /etc/nginx/conf.d/upstream.conf;
    include /etc/nginx/conf.d/default.conf;
    include /etc/nginx/conf.d/metrics.conf;
}

events {}
