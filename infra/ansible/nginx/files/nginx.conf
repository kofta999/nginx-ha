http {
    upstream auth_be {
        keepalive_timeout 60s;
        server backend:3000;
    }

    upstream products_be {
        keepalive_timeout 60s;
        server backend:4000;
    }

    server {
        listen 443 ssl http2;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols TLSv1.3;

        location /auth/ {
            proxy_pass http://auth_be/;
        }

        location /products/ {
            proxy_pass http://products_be/;
        }
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}

events {}
